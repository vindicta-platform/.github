name: Dependency Update

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for pyproject.toml
        id: check
        run: |
          if [ -f 'pyproject.toml' ]; then
            echo 'has_pyproject=true' >> $GITHUB_OUTPUT
          else
            echo 'has_pyproject=false' >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.has_pyproject == 'true'
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        if: steps.check.outputs.has_pyproject == 'true'

      - name: Update lock file
        if: steps.check.outputs.has_pyproject == 'true'
        run: |
          uv lock --upgrade 2>&1 | tee update_log.txt

      - name: Check for changes
        if: steps.check.outputs.has_pyproject == 'true'
        id: diff
        run: |
          if git diff --quiet uv.lock 2>/dev/null; then
            echo 'changed=false' >> $GITHUB_OUTPUT
            echo '::notice::All dependencies are up to date'
          else
            echo 'changed=true' >> $GITHUB_OUTPUT
            UPDATED=$(git diff uv.lock | grep '^+' | grep -c 'version' || echo '0')
            echo "count=${UPDATED}" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: |
          uv sync --all-extras
          uv run pytest tests/ -x --tb=short 2>&1 | tail -20 || true
        continue-on-error: true

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update dependencies'
          title: 'chore(deps): update dependencies'
          body: |
            ## 📦 Dependency Update

            Auto-generated by the weekly dependency update workflow.

            ~${{ steps.diff.outputs.count }} package version(s) updated in `uv.lock`.

            <details><summary>Update log</summary>

            ```
            $(cat update_log.txt | tail -50)
            ```
            </details>
          branch: auto/dependency-update
          labels: |
            chore
            automated
          delete-branch: true
