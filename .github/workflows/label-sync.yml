name: Label Sync

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  sync:
    name: Sync Labels Across Org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels to all repos
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            
            let labels;
            try {
              labels = yaml.load(fs.readFileSync('.github/labels.yml', 'utf8'));
            } catch (e) {
              core.setFailed(`Failed to parse labels.yml: ${e.message}`);
              return;
            }
            
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: 'vindicta-platform', type: 'public'
            });
            
            for (const repo of repos) {
              if (repo.archived) continue;
              core.info(`Syncing labels to ${repo.name}...`);
              
              for (const label of labels) {
                try {
                  await github.rest.issues.getLabel({
                    owner: 'vindicta-platform', repo: repo.name, name: label.name
                  });
                  await github.rest.issues.updateLabel({
                    owner: 'vindicta-platform', repo: repo.name, name: label.name,
                    color: label.color, description: label.description || ''
                  });
                } catch {
                  await github.rest.issues.createLabel({
                    owner: 'vindicta-platform', repo: repo.name, name: label.name,
                    color: label.color, description: label.description || ''
                  });
                }
              }
            }
            core.notice(`Synced ${labels.length} labels across ${repos.filter(r => !r.archived).length} repos`);
