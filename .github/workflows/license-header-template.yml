name: License Header Check

on:
  workflow_call:

concurrency:
  group: license-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Python file headers
        id: headers
        run: |
          echo '### 📜 License Header Check' >> $GITHUB_STEP_SUMMARY
          MISSING=0
          TOTAL=0
          
          while IFS= read -r file; do
            TOTAL=$((TOTAL + 1))
            # Skip __init__.py, conftest.py, and test files
            BASENAME=$(basename "$file")
            if [[ "$BASENAME" == "__init__.py" ]] || [[ "$BASENAME" == "conftest.py" ]]; then
              continue
            fi
            
            # Check for any form of copyright/license marker in first 10 lines
            HEAD=$(head -10 "$file")
            if ! echo "$HEAD" | grep -qiE '(copyright|license|SPDX|# Copyright)'; then
              echo "- ❌ \`$file\`" >> $GITHUB_STEP_SUMMARY
              MISSING=$((MISSING + 1))
            fi
          done < <(find src/ -name '*.py' -not -path '*/__pycache__/*' 2>/dev/null)
          
          if [ "$TOTAL" -eq 0 ]; then
            echo '::notice::No Python source files found in src/' >> $GITHUB_STEP_SUMMARY
          elif [ "$MISSING" -eq 0 ]; then
            echo "✅ All ${TOTAL} files have license headers" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**${MISSING}/${TOTAL} files missing headers**" >> $GITHUB_STEP_SUMMARY
            echo "::warning::${MISSING} Python files missing license headers"
          fi
          echo "missing=${MISSING}" >> $GITHUB_OUTPUT
