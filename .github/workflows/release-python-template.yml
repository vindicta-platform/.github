name: Python Release Template

on:
  workflow_call:

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Check for towncrier
        id: check-towncrier
        run: |
          if uv run towncrier --version 2>/dev/null; then
            echo "has_towncrier=true" >> $GITHUB_OUTPUT
          else
            echo "has_towncrier=false" >> $GITHUB_OUTPUT
            echo "::notice::Towncrier not found, skipping changelog generation"
          fi

      - name: Build Changelog via Towncrier
        if: steps.check-towncrier.outputs.has_towncrier == 'true'
        run: uv run towncrier build --yes --version ${{ github.ref_name }}

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
