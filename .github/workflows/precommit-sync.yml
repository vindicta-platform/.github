name: Pre-commit Config Sync

on:
  schedule:
    - cron: '0 6 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Check Pre-commit Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Compare configs across org
        uses: actions/github-script@v7
        with:
          script: |
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: 'vindicta-platform', type: 'public'
            });

            let report = '## \ud83d\udd04 Pre-commit Config Sync\n\n';
            report += '| Repo | Has Config | Hooks | Ruff Ver | MyPy Ver |\n';
            report += '|------|:----------:|:-----:|:--------:|:--------:|\n';

            const configs = {};
            let driftCount = 0;

            for (const repo of repos) {
              if (repo.archived) continue;
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: 'vindicta-platform', repo: repo.name,
                  path: '.pre-commit-config.yaml'
                });
                const content = Buffer.from(data.content, 'base64').toString();
                configs[repo.name] = content;

                const hookCount = (content.match(/- repo:/g) || []).length;
                const ruffVer = content.match(/ruff.*rev:\s*v?([\d.]+)/s)?.[1] || '-';
                const mypyVer = content.match(/mypy.*rev:\s*v?([\d.]+)/s)?.[1] || '-';

                report += `| ${repo.name} | \u2705 | ${hookCount} | ${ruffVer} | ${mypyVer} |\n`;
              } catch {
                report += `| ${repo.name} | \u274c | - | - | - |\n`;
              }
            }

            // Check for version drift
            const ruffVersions = new Set();
            const mypyVersions = new Set();
            for (const content of Object.values(configs)) {
              const rv = content.match(/ruff.*rev:\s*v?([\d.]+)/s)?.[1];
              const mv = content.match(/mypy.*rev:\s*v?([\d.]+)/s)?.[1];
              if (rv) ruffVersions.add(rv);
              if (mv) mypyVersions.add(mv);
            }

            report += '\n---\n';
            if (ruffVersions.size > 1) {
              driftCount++;
              report += `\u26a0\ufe0f **Ruff version drift**: ${[...ruffVersions].join(', ')}\n`;
            }
            if (mypyVersions.size > 1) {
              driftCount++;
              report += `\u26a0\ufe0f **MyPy version drift**: ${[...mypyVersions].join(', ')}\n`;
            }
            if (driftCount === 0) {
              report += '\u2705 All pre-commit configs are consistent.\n';
            }

            core.summary.addRaw(report);
            await core.summary.write();
