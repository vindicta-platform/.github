name: Release Drafter

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    name: Draft Release Notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=${TAG}" >> $GITHUB_OUTPUT

      - name: Collect commits since last tag
        id: commits
        run: |
          echo '## What Changed' > release_notes.md
          echo '' >> release_notes.md
          
          # Group by conventional commit type
          for type in feat fix docs refactor perf test chore; do
            COMMITS=$(git log ${{ steps.tag.outputs.latest }}..HEAD --oneline --grep="^${type}" 2>/dev/null || true)
            if [ -n "$COMMITS" ]; then
              case $type in
                feat) HEADER="🚀 Features" ;;
                fix) HEADER="🐛 Bug Fixes" ;;
                docs) HEADER="📚 Documentation" ;;
                refactor) HEADER="♻️ Refactoring" ;;
                perf) HEADER="⚡ Performance" ;;
                test) HEADER="🧪 Testing" ;;
                chore) HEADER="🔧 Maintenance" ;;
              esac
              echo "### ${HEADER}" >> release_notes.md
              echo "$COMMITS" | while IFS= read -r line; do
                echo "- ${line}" >> release_notes.md
              done
              echo '' >> release_notes.md
            fi
          done
          
          # Contributors
          echo '### 👥 Contributors' >> release_notes.md
          git log ${{ steps.tag.outputs.latest }}..HEAD --format='%aN' | sort -u | while IFS= read -r name; do
            echo "- @${name}" >> release_notes.md
          done

      - name: Upload draft notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-draft
          path: release_notes.md
          retention-days: 30

      - name: Post summary
        run: |
          echo '### 📋 Release Draft' >> $GITHUB_STEP_SUMMARY
          cat release_notes.md >> $GITHUB_STEP_SUMMARY
