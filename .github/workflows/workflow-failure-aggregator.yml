name: Workflow Failure Aggregator

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  aggregate:
    name: Daily Failure Report
    runs-on: ubuntu-latest
    steps:
      - name: Collect failures
        uses: actions/github-script@v7
        with:
          script: |
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: 'vindicta-platform', type: 'public'
            });

            const now = new Date();
            const yesterday = new Date(now - 24 * 60 * 60 * 1000);
            const since = yesterday.toISOString();

            let report = `## \ud83d\udea8 Workflow Failure Report \u2014 ${now.toISOString().slice(0, 10)}\n\n`;
            let failures = [];

            for (const repo of repos) {
              if (repo.archived) continue;
              try {
                const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner: 'vindicta-platform', repo: repo.name,
                  status: 'failure', created: `>=${since}`, per_page: 20
                });

                for (const run of runs.workflow_runs) {
                  failures.push({
                    repo: repo.name,
                    workflow: run.name,
                    branch: run.head_branch,
                    url: run.html_url,
                    created: run.created_at.slice(0, 16).replace('T', ' ')
                  });
                }
              } catch { continue; }
            }

            if (failures.length === 0) {
              report += '\u2705 **No workflow failures in the last 24 hours!**\n';
            } else {
              report += `**${failures.length} failure(s) in the last 24 hours:**\n\n`;
              report += '| Repo | Workflow | Branch | Time | Link |\n';
              report += '|------|----------|--------|------|------|\n';

              for (const f of failures) {
                report += `| ${f.repo} | ${f.workflow} | \`${f.branch}\` | ${f.created} | [View](${f.url}) |\n`;
              }
            }

            // Upsert daily failure issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: 'vindicta-platform', repo: '.github',
              labels: 'automated', state: 'open'
            });
            const existing = issues.find(i => i.title.includes('Workflow Failure Report'));

            if (failures.length > 0) {
              const title = `\ud83d\udea8 Workflow Failure Report \u2014 ${now.toISOString().slice(0, 10)}`;
              if (existing) {
                await github.rest.issues.update({
                  owner: 'vindicta-platform', repo: '.github',
                  issue_number: existing.number, body: report, title
                });
              } else {
                await github.rest.issues.create({
                  owner: 'vindicta-platform', repo: '.github',
                  title, body: report, labels: ['automated']
                });
              }
            } else if (existing) {
              await github.rest.issues.update({
                owner: 'vindicta-platform', repo: '.github',
                issue_number: existing.number, state: 'closed',
                state_reason: 'completed'
              });
            }

            core.summary.addRaw(report);
            await core.summary.write();
