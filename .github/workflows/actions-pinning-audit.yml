name: Actions Version Pinning Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Check Action Version Pinning
    runs-on: ubuntu-latest
    steps:
      - name: Audit all org repos
        uses: actions/github-script@v7
        with:
          script: |
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: 'vindicta-platform', type: 'public'
            });

            let report = '## \ud83d\udd12 Actions Version Pinning Audit\n\n';
            report += '| Repo | Workflow | Unpinned Actions |\n';
            report += '|------|----------|-----------------|\n';
            let totalUnpinned = 0;

            for (const repo of repos) {
              if (repo.archived) continue;
              try {
                const { data: contents } = await github.rest.repos.getContent({
                  owner: 'vindicta-platform', repo: repo.name,
                  path: '.github/workflows'
                });

                for (const file of contents) {
                  if (!file.name.endsWith('.yml') && !file.name.endsWith('.yaml')) continue;
                  try {
                    const { data: fileData } = await github.rest.repos.getContent({
                      owner: 'vindicta-platform', repo: repo.name,
                      path: file.path
                    });
                    const content = Buffer.from(fileData.content, 'base64').toString();
                    const unpinned = [];

                    const usesMatches = content.matchAll(/uses:\s+([^\s]+)/g);
                    for (const match of usesMatches) {
                      const action = match[1];
                      if (action.includes('@main') || action.includes('@master')) {
                        unpinned.push(action);
                      }
                    }

                    if (unpinned.length > 0) {
                      totalUnpinned += unpinned.length;
                      report += `| ${repo.name} | ${file.name} | ${unpinned.map(a => '`' + a + '`').join(', ')} |\n`;
                    }
                  } catch { continue; }
                }
              } catch { continue; }
            }

            if (totalUnpinned === 0) {
              report += '| \u2705 All repos | All workflows | All actions properly pinned |\n';
            }

            report += `\n---\n**Total unpinned:** ${totalUnpinned}\n`;
            report += '\n> Actions pinned to `@main`/`@master` are a supply-chain risk. Pin to specific versions or SHA.\n';

            // Update or create issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: 'vindicta-platform', repo: '.github',
              labels: 'security,automated', state: 'open'
            });
            const existing = issues.find(i => i.title.includes('Actions Version Pinning'));

            const now = new Date().toISOString().slice(0, 10);
            if (existing) {
              await github.rest.issues.update({
                owner: 'vindicta-platform', repo: '.github',
                issue_number: existing.number, body: report,
                title: `\ud83d\udd12 Actions Version Pinning Audit \u2014 ${now}`
              });
            } else if (totalUnpinned > 0) {
              await github.rest.issues.create({
                owner: 'vindicta-platform', repo: '.github',
                title: `\ud83d\udd12 Actions Version Pinning Audit \u2014 ${now}`,
                body: report, labels: ['security', 'automated']
              });
            }

            core.summary.addRaw(report);
            await core.summary.write();
