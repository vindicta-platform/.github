name: Package Publish Gate

on:
  workflow_call:

jobs:
  gate:
    name: Pre-Release Validation
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5

      - name: Extract tag version
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT

      - name: Verify pyproject.toml version matches tag
        run: |
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${{ steps.version.outputs.tag }}"
          echo "### 📦 Publish Gate" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** v${TAG_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **pyproject.toml:** ${PKG_VERSION}" >> $GITHUB_STEP_SUMMARY
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: tag v${TAG_VERSION} != pyproject.toml ${PKG_VERSION}"
            echo "❌ Version mismatch" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Versions match" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check CHANGELOG entry
        run: |
          TAG_VERSION="${{ steps.version.outputs.tag }}"
          if [ -f CHANGELOG.md ] && grep -q "$TAG_VERSION" CHANGELOG.md; then
            echo "✅ CHANGELOG entry found for v${TAG_VERSION}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No CHANGELOG entry for v${TAG_VERSION}" >> $GITHUB_STEP_SUMMARY
            echo "::warning::No CHANGELOG entry for this release"
          fi

      - name: Run full test suite
        run: |
          uv sync --all-extras
          uv run pytest tests/ -v --tb=short 2>&1 | tail -30
          echo "✅ All tests passing" >> $GITHUB_STEP_SUMMARY

      - name: Build package (dry run)
        run: |
          uv build
          ls -la dist/
          echo "✅ Package builds successfully" >> $GITHUB_STEP_SUMMARY
          echo "- $(ls dist/*.whl)" >> $GITHUB_STEP_SUMMARY
          echo "- $(ls dist/*.tar.gz)" >> $GITHUB_STEP_SUMMARY
