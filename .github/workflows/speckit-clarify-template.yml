name: Speckit Clarify on PR

on:
  workflow_call:

jobs:
  speckit-clarify:
    name: Speckit Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for spec files in PR
        id: check-specs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const specFiles = files.filter(f =>
              f.filename.includes('spec.md') ||
              f.filename.includes('specs/') ||
              f.filename.endsWith('.feature')
            );
            if (specFiles.length > 0) {
              core.setOutput('has_specs', 'true');
              core.setOutput('spec_files', specFiles.map(f => f.filename).join(','));
              core.notice(`Found spec files: ${specFiles.map(f => f.filename).join(', ')}`);
            } else {
              core.setOutput('has_specs', 'false');
              core.notice('No spec files found in PR, skipping analysis');
            }

      - uses: astral-sh/setup-uv@v5
        if: steps.check-specs.outputs.has_specs == 'true'

      - name: Set up Python
        if: steps.check-specs.outputs.has_specs == 'true'
        run: uv python install 3.12

      - name: Cache Ollama models
        if: steps.check-specs.outputs.has_specs == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-phi3
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Start Ollama service
        if: steps.check-specs.outputs.has_specs == 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull phi3 || true

      - name: Setup Node.js (for repomix)
        if: steps.check-specs.outputs.has_specs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package context with repomix
        if: steps.check-specs.outputs.has_specs == 'true'
        run: |
          npx -y repomix \
            --include "specs/**/*.md,features/**/*.feature,src/**/*.py,tests/**/*.py" \
            --ignore "node_modules/**,.venv/**,site/**,.git/**" \
            -o repomix_context.xml

      - name: Run spec analysis
        if: steps.check-specs.outputs.has_specs == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPEC_FILES: ${{ steps.check-specs.outputs.spec_files }}
        run: |
          python -c "
          import ollama, json, os

          spec_files = os.environ.get('SPEC_FILES', '').split(',')
          context_parts = []
          for sf in spec_files:
              try:
                  with open(sf.strip()) as f:
                      context_parts.append(f'### {sf}\n{f.read()}')
              except FileNotFoundError:
                  pass

          if not context_parts:
              print('No spec files readable, skipping')
              exit(0)

          prompt = f'''Analyze these specification files for completeness and consistency.
          Identify: unclear requirements, missing edge cases, ambiguous acceptance criteria,
          and potential conflicts between specs.

          {chr(10).join(context_parts)}

          Respond with a concise markdown summary of findings.'''

          response = ollama.chat(model='phi3', messages=[{'role': 'user', 'content': prompt}])
          analysis = response['message']['content']

          with open('analysis_output.md', 'w') as f:
              f.write(analysis)
          print(analysis)
          "

      - name: Post analysis as PR comment
        if: steps.check-specs.outputs.has_specs == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const analysis = fs.readFileSync('analysis_output.md', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 🔍 Speckit Analysis (Automated)\n\n${analysis}\n\n---\n*Generated by Ollama phi3 on GitHub Actions*`
              });
            } catch (e) {
              core.warning(`Could not post analysis: ${e.message}`);
            }
