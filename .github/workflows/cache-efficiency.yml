name: Cache Efficiency Report

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  report:
    name: Analyze Cache Hit Rates
    runs-on: ubuntu-latest
    steps:
      - name: Collect cache stats
        uses: actions/github-script@v7
        with:
          script: |
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: 'vindicta-platform', type: 'public'
            });

            let report = '## \ud83d\udce6 Cache Efficiency Report\n\n';
            report += '| Repo | Cache Keys | Total Size (MB) | Oldest Entry |\n';
            report += '|------|:----------:|:---------------:|:------------:|\n';
            let totalCaches = 0;
            let totalSizeMB = 0;

            for (const repo of repos) {
              if (repo.archived) continue;
              try {
                const { data: cacheList } = await github.rest.actions.getActionsCacheList({
                  owner: 'vindicta-platform', repo: repo.name, per_page: 100
                });

                if (cacheList.total_count === 0) continue;

                const sizeMB = (cacheList.actions_caches.reduce((s, c) => s + (c.size_in_bytes || 0), 0) / (1024 * 1024)).toFixed(1);
                const oldest = cacheList.actions_caches
                  .map(c => c.created_at)
                  .sort()[0]
                  ?.slice(0, 10) || '-';

                totalCaches += cacheList.total_count;
                totalSizeMB += parseFloat(sizeMB);

                report += `| ${repo.name} | ${cacheList.total_count} | ${sizeMB} | ${oldest} |\n`;
              } catch { continue; }
            }

            report += `| **TOTAL** | **${totalCaches}** | **${totalSizeMB.toFixed(1)}** | |\n`;
            report += '\n---\n';

            if (totalSizeMB > 5000) {
              report += '> \u26a0\ufe0f Total cache usage exceeds 5 GB. Consider pruning stale entries.\n';
            } else {
              report += '> \u2705 Cache usage is within normal bounds.\n';
            }

            core.summary.addRaw(report);
            await core.summary.write();
            core.notice(`${totalCaches} caches totaling ${totalSizeMB.toFixed(1)} MB`);
